name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

# Shared by both jobs.
env:
  # Force any JS action still declaring node20 onto Node.js 24 (GitHub
  # deprecated node20 runners 2026-06-02). All pinned actions are node24-native
  # as of the v7/v8/v3 bumps; kept as a safety net for future additions.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Least-privilege floor. verify-ci/test/build only read; publish raises its
# own block for the release upload + provenance.
permissions:
  contents: read

jobs:
  # Skip a full ~16 min testReleaseUnitTest re-run when CI has already
  # verified the tagged commit on main — same commit, same test invocation
  # would produce the same result. Falls through to a real test run if
  # CI hasn't reported yet (rare: tag created without a prior main push)
  # or reported anything other than success.
  verify-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      ci-passed: ${{ steps.check.outputs.passed }}
    steps:
      - name: Check CI status on tagged commit
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # combined status endpoint aggregates required-check results for
          # this SHA. "success" means every required check passed.
          state=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/status" --jq '.state' || echo "unknown")
          echo "CI combined state for ${GITHUB_SHA:0:7}: ${state}"
          if [ "$state" = "success" ]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
          fi

  # Unit tests run once — flavor-agnostic, not worth duplicating per ABI.
  # Skipped entirely when CI already reported success for this SHA.
  # Runs on the free 4-core runner; larger runners are paid-tier and were
  # silently queueing release builds once that budget was exhausted.
  test:
    needs: verify-ci
    if: needs.verify-ci.outputs.ci-passed != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          submodules: false
      # Unit tests don't compile the Wayland native build, so we skip
      # `wayland-android` entirely — its freedesktop submodule chain
      # (cairo, mesa-drm, fontconfig, libinput) goes through
      # gitlab.freedesktop.org which intermittently 5xxs and breaks
      # this job for non-test reasons. The build job below still does
      # the full recursive init.
      - uses: ./.github/actions/init-submodules-with-retry
        with:
          paths: |
            termlib
            mosh-kotlin
            et-kotlin
            spice-kotlin
            reticulum-kt
            rnsh-kt
            build-proot/proot-termux
      - uses: ./.github/actions/setup-toolchain
      - name: Run release unit tests
        run: ./gradlew testReleaseUnitTest
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

  # One signed APK + AAB per ABI in parallel — roughly halves wall time vs
  # running all four Gradle tasks sequentially in a single job.
  #
  # `needs: [verify-ci, test]` with `if: !cancelled() && (test skipped OR
  # test succeeded)` lets build proceed when CI has already greenlit the
  # SHA (test was skipped) or when a fresh test run passes.
  build:
    needs: [verify-ci, test]
    if: |
      !cancelled() &&
      (needs.verify-ci.outputs.ci-passed == 'true' || needs.test.result == 'success')
    # Free 4-core runner — arm64 + x64 build jobs run in parallel (matrix).
    # Paid larger-tier runners silently queue forever once the Actions
    # spending cap is hit, so we use the free tier and eat the extra build
    # time. Timeout is generous to allow the full Rust/Go/Gradle compile
    # on 4 cores (observed: ~60 min per ABI worst-case).
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - { abi: arm64, variant: Arm64 }
          - { abi: x64,   variant: X64 }
          - { abi: armv7, variant: Armv7 }
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          submodules: false
      - uses: ./.github/actions/init-submodules-with-retry
      - uses: ./.github/actions/setup-toolchain
      - name: Decode release keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > haven-release.jks
      - name: Build signed APK + AAB (${{ matrix.abi }})
        run: ./gradlew :app:assemble${{ matrix.variant }}Release :app:bundle${{ matrix.variant }}Release
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      # R8 reflective-class survival check — moved here from CI's per-push
      # release-r8-smoke job (which now runs on PRs only). This release build
      # already ran R8 (minify), so the assert is free here and guarantees
      # every published release is checked even on direct-to-main pushes.
      # ABI-agnostic (inspects the R8 mapping), so run it once on arm64.
      - name: Assert reflectively-loaded classes survived R8
        if: matrix.abi == 'arm64'
        run: ./scripts/check-r8-kept-classes.sh
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: haven-${{ matrix.abi }}-release
          path: |
            app/build/outputs/apk/${{ matrix.abi }}/release/haven-*-release.apk
            app/build/outputs/bundle/${{ matrix.abi }}Release/*.aab
          if-no-files-found: error
          retention-days: 7

  # Aggregate both ABIs onto a single GitHub release. Splitting this from
  # build lets the per-ABI jobs run in parallel while the release step
  # still sees every artifact.
  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    # Publish is just artifact download + GitHub Release upload — no heavy
    # compile work. Keep on the free 4-core runner to avoid spending larger-
    # runner minutes on ~20 seconds of I/O.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Reviewer-gated: the `signing` Environment (configured in repo settings
    # with a required reviewer + v*/main restriction) must approve before the
    # release is published, so no single account can ship unilaterally.
    environment: signing
    permissions:
      contents: write        # create the GitHub Release + upload assets
      id-token: write         # OIDC for build-provenance attestation
      attestations: write     # write the provenance attestation
    steps:
      # First — checkout runs `git clean`, so it must precede the artifact
      # downloads or it would wipe release/. Provides CHANGELOG.md + the
      # extractor script (each job runs on a fresh runner).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          submodules: false
      - name: Download arm64 artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: haven-arm64-release
          path: release/
      - name: Download x64 artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: haven-x64-release
          path: release/
      - name: Download armv7 artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: haven-armv7-release
          path: release/
      # Cryptographically tie each binary to this repo + commit + workflow so
      # downstreams (F-Droid, users) can verify provenance with `gh attestation
      # verify <file> --repo GlassHaven/Haven`.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2.4.0
        with:
          subject-path: |
            release/**/*.apk
            release/**/*.aab
      # Publish a flat checksum manifest alongside the assets (asset names are
      # basenames once on the release, so the manifest uses basenames too).
      - name: Generate SHA256SUMS
        run: |
          : > SHA256SUMS
          find release -type f \( -name '*.apk' -o -name '*.aab' \) | sort | while read -r f; do
            printf '%s  %s\n' "$(sha256sum "$f" | cut -d' ' -f1)" "$(basename "$f")" >> SHA256SUMS
          done
          cat SHA256SUMS
      # The notes for this tag must already exist in CHANGELOG.md (CI lint
      # enforces it at version-bump time). Extract that section as the release
      # body; generate_release_notes still appends the "Full Changelog" link.
      - name: Extract release notes from CHANGELOG.md
        run: ./scripts/check-changelog.sh extract "${GITHUB_REF_NAME}" > RELEASE_NOTES.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          files: |
            release/**/*.apk
            release/**/*.aab
            SHA256SUMS
