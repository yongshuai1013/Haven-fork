name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege floor. Every job here only reads the repo and uploads
# artifacts (which use the Actions runtime token, not GITHUB_TOKEN), so a
# read-only token is sufficient. Jobs needing more would declare their own.
permissions:
  contents: read

jobs:
  # Fast supply-chain guards — no toolchain, runs in parallel with the build
  # jobs and fails the run early if hardening regresses.
  supply-chain:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          submodules: false
      # Every external action must be pinned to a 40-char commit SHA. A bare
      # `@v1`/`@main`/`@master` ref is mutable and re-pointable (tj-actions
      # CVE-2025-30066 class). Local `./.github/actions/*` refs are exempt.
      - name: Assert external actions are SHA-pinned
        run: |
          if grep -rEn 'uses: [^.].+@(v[0-9]|main|master)' .github/workflows .github/actions; then
            echo "::error::Unpinned external action ref(s) above — pin to a 40-char SHA (# vX.Y.Z)."
            exit 1
          fi
      # Validate the gradle-wrapper.jar that CI actually executes against
      # Gradle's published checksums (wrapper-attack class). Submodule wrappers
      # aren't executed by CI, so the root jar is the one that matters.
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92  # v6.1.1 (Node 24)

  # Three independent Gradle entry-points run as parallel jobs instead of
  # sequentially in one. Each restores the shared toolchain + caches from
  # the composite action; the second run of each job type reuses the cache
  # populated by the first, so the duplicated cache-restore cost is minimal.

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          submodules: false
      - uses: ./.github/actions/init-submodules-with-retry
      - uses: ./.github/actions/setup-toolchain
      - name: Run unit tests
        # :app uses ABI product flavors, so the unqualified `testDebugUnitTest`
        # matches no :app task and silently skips the agent/MCP unit tests.
        # Name the flavor task explicitly (arm64 only — unit tests are
        # flavor-agnostic) so they actually run in CI.
        run: ./gradlew testDebugUnitTest :app:testArm64DebugUnitTest
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: test-results
          path: '**/build/reports/tests/'
          retention-days: 14

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          submodules: false
      # Fail fast (before the toolchain/submodule setup) if the current
      # versionName has no CHANGELOG.md section — a release can't ship without
      # human-written notes.
      - name: Check CHANGELOG has notes for the current version
        run: ./scripts/check-changelog.sh
      - uses: ./.github/actions/init-submodules-with-retry
      - uses: ./.github/actions/setup-toolchain
      - name: Check for hardcoded UI strings (#210)
        run: ./scripts/check-i18n-hardcoded.sh
      - name: Check translation export is current
        # docs/i18n/strings.json feeds the Pages translation page. Regenerate
        # and fail if it drifted from the strings.xml sources (rerun
        # scripts/i18n_export.py and commit the result).
        run: |
          python3 scripts/i18n_export.py
          git diff --exit-code docs/i18n/strings.json
      - name: Run lint
        run: ./gradlew lintDebug
      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: lint-results
          path: |
            **/build/reports/lint-results-debug.html
            **/build/reports/lint-results-debug.xml
          if-no-files-found: ignore
          retention-days: 14

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          submodules: false
      - uses: ./.github/actions/init-submodules-with-retry
      - uses: ./.github/actions/setup-toolchain
      # Build arm64 only in CI — the x64 flavor exists for emulator support
      # and Play Store fat distribution, not smoke-testing main. Cuts build
      # work roughly in half vs :app:assembleDebug (which expands to both).
      - name: Build arm64 debug APK
        run: ./gradlew :app:assembleArm64Debug
      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: app-debug
          path: app/build/outputs/apk/arm64/debug/haven-*-arm64-debug.apk
          retention-days: 7

  # Release-only safety net. The build/test/lint jobs above all run *debug*,
  # which doesn't run R8 — so an R8 rename of a reflectively-loaded class ships
  # a feature 100% broken in release while every check stays green. That is
  # exactly how the email feature shipped briefly broken: R8 renamed
  # com.sun.mail.imap.IMAPSSLStore, so getStore("imaps") threw
  # NoSuchProviderException in release builds only (fixed in v5.59.45). Here we
  # run R8 on the release variant and assert the by-name-loaded classes survive.
  # No keystore needed — minify runs before packaging/signing.
  release-r8-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: false
      - uses: ./.github/actions/init-submodules-with-retry
      - uses: ./.github/actions/setup-toolchain
      - name: R8 the release variant
        run: ./gradlew :app:minifyArm64ReleaseWithR8
      - name: Assert reflectively-loaded classes survived R8
        run: ./scripts/check-r8-kept-classes.sh
